    <script>
        window.googletag = window.googletag || {cmd: []};
        googletag.cmd.push(function() {
            var targetingKeywords = '<!--#echo encoding="none" var="keywords"-->';
            var path = window.location.pathname.split('/');
            var targeting_category_primary = (path.length === 7) ? path[2] : ((path.length === 8) ? path[3] : path[3] + '-' + path[4]);
            targeting_category_primary = targeting_category_primary === 'deporte' ? 'deportes' : targeting_category_primary;
            
            googletag.pubads().enableSingleRequest();
            googletag.pubads().collapseEmptyDivs();
            googletag.pubads()
                .setTargeting('tipo', 'articulo-dinamico')
                .setTargeting('post-id', '<!--#echo var="id" -->')
                .setTargeting('category-primary', targeting_category_primary)
                .setTargeting('keywords', targetingKeywords.split(',').map(s => s.normalize("NFKD").replace(/[^a-z0-9\s]/gi, "").trim().toLowerCase()));
            googletag.enableServices();
        });

    <!-- SCRIPT DE CÁLCULO DE CONTRASTE Y JS FINAL -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            // Función para calcular si el color que envió el periodista es Claro u Oscuro
            function adaptarContraste(elementoId, colorHex) {
                const elemento = document.getElementById(elementoId);
                if (!elemento || !colorHex || colorHex.trim() === '') return;
                
                let hex = colorHex.replace('#', '');
                if (hex.length === 3) hex = hex.split('').map(char => char + char).join('');
                if (hex.length !== 6) return;
                
                let r = parseInt(hex.substring(0, 2), 16);
                let g = parseInt(hex.substring(2, 4), 16);
                let b = parseInt(hex.substring(4, 6), 16);
                
                let luminancia = (r * 0.299) + (g * 0.587) + (b * 0.114);
                // Asigna "claro" u "oscuro" 
                elemento.setAttribute('data-tema', luminancia > 150 ? 'claro' : 'oscuro');
            }

            // Aplicamos la evaluación al Header y al Footer con las variables que escupió el servidor
            adaptarContraste('header-dinamico', '<!--#echo var="color_cabecera" -->');
            adaptarContraste('footer-dinamico', '<!--#echo var="color_footer" -->');

            // Contador de visitas nativo de BioBio
            function cargarVisitas(id) {
                if(typeof getVisits === "function") {
                    getVisits(id, axios).then(function (visitas) {
                        let contador = document.getElementById('visitas');
                        if(contador) contador.textContent = visitas.toLocaleString();
                    });
                }
            }
            cargarVisitas(<!--#echo var="id" -->);
        });
    </script>
